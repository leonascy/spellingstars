<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#faf9f7;color:#1a1a1a;min-height:100vh;}
.app{max-width:620px;margin:0 auto;padding:1.2rem 1rem 3rem;}
h1{font-size:22px;font-weight:700;text-align:center;color:#2d2060;margin-bottom:3px;}
.sub{text-align:center;font-size:13px;color:#999;margin-bottom:1.2rem;}
.trophy-screen{background:#fff;border-radius:16px;border:1px solid #ebe9f8;padding:1.4rem;margin-bottom:1rem;}
.trophy-screen h2{font-size:16px;font-weight:700;color:#2d2060;margin-bottom:4px;}
.tsub{font-size:12px;color:#aaa;margin-bottom:1.2rem;}
.weeks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.2rem;}
.week-card{background:#f7f6ff;border-radius:12px;border:1px solid #e5e3f5;padding:10px 6px;text-align:center;cursor:default;transition:all .15s;}
.week-card.has-words{cursor:pointer;}
.week-card.has-words:hover{border-color:#c5c1f0;}
.week-card.perfect{background:#fffbf0;border-color:#f5d060;}
.week-card.active{border:2px solid #7F77DD;background:#eeedfe;}
.wk-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.wk-stars{font-size:16px;line-height:1;margin-bottom:4px;min-height:20px;}
.wk-score{font-size:11px;color:#888;}
.start-btn{width:100%;padding:11px;border-radius:10px;border:none;background:#534AB7;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.start-btn:hover{background:#3C3489;}
.pips{display:flex;gap:4px;justify-content:center;margin-bottom:1.2rem;}
.pip{height:7px;flex:1;max-width:50px;border-radius:4px;background:#e5e3f5;}
.pip.done{background:#5DCAA5;}.pip.cur{background:#7F77DD;}
.card{background:#fff;border-radius:16px;border:1px solid #ebe9f8;padding:1.4rem;margin-bottom:.8rem;}
.wnum{font-size:11px;color:#bbb;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
.tabs{display:flex;gap:6px;margin-bottom:1.1rem;}
.tab{flex:1;padding:7px 0;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #e0ddf5;cursor:pointer;background:#fff;color:#aaa;text-align:center;transition:all .15s;}
.tab.on{background:#eeedfe;color:#534AB7;border-color:#c5c1f0;}
.sent-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#f7f6ff;border-radius:10px;margin-bottom:1rem;}
.sent-text{font-size:15px;line-height:1.7;color:#222;flex:1;}
.sent-text .tw{font-weight:800;text-decoration:underline;color:#2d2060;text-underline-offset:3px;}
.sent-text .blank{display:inline-block;min-width:60px;border-bottom:2px solid #7F77DD;vertical-align:bottom;margin:0 2px;}
.spk{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#7F77DD;flex-shrink:0;transition:background .15s;}
.spk:hover{background:#eeedfe;}
.spk svg{width:20px;height:20px;}
.mean{font-size:13px;color:#555;padding:8px 12px;border-left:3px solid #5DCAA5;border-radius:0 8px 8px 0;background:#f0faf6;margin-bottom:1.1rem;}
.mean b{color:#1a1a1a;}
.plabel{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#bbb;margin-bottom:8px;}
.ph-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.1rem;}
.ph{padding:8px 13px;border-radius:10px;font-size:17px;font-weight:700;display:flex;flex-direction:column;align-items:center;min-width:46px;}
.ph .ipa{font-size:10px;font-weight:400;margin-top:3px;opacity:.65;font-family:monospace;}
.ph .ptype{font-size:9px;margin-top:1px;opacity:.5;text-transform:uppercase;letter-spacing:.04em;}
.ph.v{background:#eeedfe;color:#3C3489;}
.ph.c{background:#e1f5ee;color:#085041;}
.ph.b{background:#faece7;color:#712B13;}
.ph.d{background:#faeeda;color:#633806;}
.ph.s{background:#f1efe8;color:#aaa;}
.tip{font-size:13px;color:#666;padding:9px 12px;background:#fafaf5;border-radius:8px;margin-bottom:1.1rem;line-height:1.5;}
.leg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.1rem;}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:#aaa;}
.ld{width:9px;height:9px;border-radius:2px;}
.spell-action-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid #e0ddf5;background:#fff;cursor:pointer;width:100%;text-align:left;transition:background .15s;margin-bottom:1.1rem;}
.spell-action-btn:hover{background:#f0eeff;}
.spk-circle{width:34px;height:34px;border-radius:50%;background:#eeedfe;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.spk-circle svg{width:18px;height:18px;color:#534AB7;}
.btn-label{font-size:13px;font-weight:600;color:#333;}
.btn-sub{font-size:12px;color:#aaa;margin-top:1px;}
.spell-input{font-size:22px;padding:10px 14px;width:100%;border-radius:10px;border:1.5px solid #ddd;background:#fff;color:#222;margin-bottom:12px;outline:none;transition:border-color .2s;direction:ltr;text-align:left;}
.spell-input:focus{border-color:#7F77DD;}
.spell-input.correct{border-color:#1D9E75;background:#f0faf6;}
.spell-input.wrong{border-color:#D85A30;background:#fff5f3;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
button.act{font-size:13px;padding:9px 18px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#333;cursor:pointer;font-weight:500;}
button.act:hover{background:#f5f5f5;}
button.pri{background:#534AB7;color:#fff;border-color:#534AB7;}
button.pri:hover{background:#3C3489;}
button.suc{background:#1D9E75;color:#fff;border-color:#1D9E75;}
button.warn{background:#D85A30;color:#fff;border-color:#D85A30;}
.fb{margin-top:12px;padding:11px 14px;border-radius:10px;font-size:14px;line-height:1.5;}
.fb.good{background:#e1f5ee;color:#085041;}
.fb.bad{background:#faece7;color:#712B13;}
.test-card{background:#fff;border-radius:16px;border:1px solid #ebe9f8;padding:1.4rem;margin-bottom:1rem;}
.test-title{font-size:16px;font-weight:700;color:#2d2060;margin-bottom:4px;}
.test-sub{font-size:12px;color:#aaa;margin-bottom:1.2rem;}
.test-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f0eeff;}
.test-row:last-of-type{border-bottom:none;}
.test-num{font-size:13px;font-weight:700;color:#bbb;min-width:20px;}
.test-spk{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;color:#7F77DD;display:flex;align-items:center;flex-shrink:0;}
.test-spk:hover{background:#eeedfe;}
.test-spk.playing{color:#534AB7;background:#eeedfe;}
.test-spk svg{width:20px;height:20px;}
.test-input{font-size:16px;padding:7px 11px;flex:1;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#222;outline:none;direction:ltr;text-align:left;transition:border-color .2s;}
.test-input:focus{border-color:#7F77DD;}
.test-input.t-ok{border-color:#1D9E75;background:#f0faf6;color:#085041;}
.test-input.t-bad{border-color:#D85A30;background:#fff5f3;color:#993C1D;}
.test-correct-ans{font-size:11px;color:#D85A30;font-weight:700;min-width:90px;text-align:right;}
.test-actions{display:flex;gap:8px;margin-top:1.2rem;flex-wrap:wrap;}
.sc{text-align:center;padding:1.5rem 1rem;}
.sc-stars{font-size:26px;letter-spacing:1px;margin-bottom:.6rem;}
.sc-num{font-size:48px;font-weight:700;color:#534AB7;line-height:1;}
.sc h2{font-size:20px;font-weight:700;margin:.6rem 0 .3rem;}
.sc p{color:#777;margin-bottom:.6rem;font-size:14px;}
.choc-box{background:#fffbf0;border:2px solid #f5c842;border-radius:12px;padding:1rem;margin:1rem 0;font-size:15px;color:#7a5c00;font-weight:600;}
.choc-icon{font-size:42px;margin-bottom:.4rem;}
.sc-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:1rem;}
@keyframes pop{0%{transform:scale(0.6);opacity:0;}70%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
.pop{animation:pop .35s ease forwards;}
</style>
</head>
<body>
<div class="app">
  <h1>Spelling Stars ⭐</h1>
  <p class="sub">Learn, listen and spell your way to the top!</p>
  <div id="root"></div>
</div>
<script>
const WEEKS=[
 {week:4,words:[
  {word:"zebra",target:"zebra",sentence:"The zebra is an animal that looks like a horse and has black and white stripes.",meaning:"An African animal with black and white stripes.",phonemes:[{p:"z",t:"c",ipa:"/z/"},{p:"e",t:"v",ipa:"/ɛ/ eh"},{p:"br",t:"b",ipa:"/br/"},{p:"a",t:"v",ipa:"/ə/ uh"}],hint:"'z' buzzes like a bee. 'br' is a blend. The 'a' at the end sounds like a soft uh."},
  {word:"again",target:"again",sentence:"The old man is in the hospital again because he has not recovered from his injury.",meaning:"One more time.",phonemes:[{p:"a",t:"v",ipa:"/ə/ uh"},{p:"g",t:"c",ipa:"/g/"},{p:"ai",t:"d",ipa:"/ɛ/ eh"},{p:"n",t:"c",ipa:"/n/"}],hint:"'a' at the start sounds like uh. 'ai' here sounds like short e."},
  {word:"leaves",target:"leaves",sentence:"The fallen leaves have dried up.",meaning:"The flat green parts that grow on trees and plants.",phonemes:[{p:"l",t:"c",ipa:"/l/"},{p:"ea",t:"d",ipa:"/iː/ ee"},{p:"v",t:"c",ipa:"/v/"},{p:"es",t:"d",ipa:"/z/"}],hint:"'ea' makes a long ee sound here — like in eat and sea."},
  {word:"lizard",target:"lizard",sentence:"I found a lizard behind the painting on the wall.",meaning:"A small reptile with four legs and a long tail.",phonemes:[{p:"l",t:"c",ipa:"/l/"},{p:"i",t:"v",ipa:"/ɪ/ ih"},{p:"z",t:"c",ipa:"/z/"},{p:"ar",t:"d",ipa:"/ɑː/ ar"},{p:"d",t:"c",ipa:"/d/"}],hint:"'z' buzzes. 'ar' makes the ar sound — like in car and star."},
  {word:"baboon",target:"baboon",sentence:"The baboon swung from tree to tree.",meaning:"A large monkey with a long snout, found in Africa.",phonemes:[{p:"b",t:"c",ipa:"/b/"},{p:"a",t:"v",ipa:"/æ/ a"},{p:"b",t:"c",ipa:"/b/"},{p:"oo",t:"d",ipa:"/uː/ oo"},{p:"n",t:"c",ipa:"/n/"}],hint:"'oo' makes a long ooo sound — like in moon."},
  {word:"teatime",target:"teatime",sentence:"We always drink red bean soup at teatime.",meaning:"The time in the afternoon when tea and snacks are usually eaten.",phonemes:[{p:"t",t:"c",ipa:"/t/"},{p:"ea",t:"d",ipa:"/iː/ ee"},{p:"t",t:"c",ipa:"/t/"},{p:"i",t:"v",ipa:"/aɪ/ eye"},{p:"m",t:"c",ipa:"/m/"},{p:"e",t:"s",ipa:"silent"}],hint:"'ea' says ee. 'i' in time says eye. The 'e' at the end is silent."},
  {word:"hippopotamus",target:"hippopotamus",sentence:"The hippopotamus cooled itself down in the river.",meaning:"A very large, heavy animal that lives near rivers in Africa.",phonemes:[{p:"h",t:"c",ipa:"/h/"},{p:"i",t:"v",ipa:"/ɪ/ ih"},{p:"pp",t:"c",ipa:"/p/"},{p:"o",t:"v",ipa:"/ɒ/ o"},{p:"p",t:"c",ipa:"/p/"},{p:"o",t:"v",ipa:"/ɒ/ o"},{p:"t",t:"c",ipa:"/t/"},{p:"a",t:"v",ipa:"/æ/ a"},{p:"m",t:"c",ipa:"/m/"},{p:"us",t:"d",ipa:"/əs/"}],hint:"A long word — break it into parts: hip · po · pot · a · mus."},
  {word:"branches",target:"branches",sentence:"The branches of a tree are smaller than its trunk.",meaning:"The parts that grow out from the trunk of a tree.",phonemes:[{p:"br",t:"b",ipa:"/br/"},{p:"a",t:"v",ipa:"/æ/ a"},{p:"n",t:"c",ipa:"/n/"},{p:"ch",t:"d",ipa:"/tʃ/ ch"},{p:"es",t:"d",ipa:"/ɪz/"}],hint:"'br' is a blend. 'ch' sounds like ch in chip."},
  {word:"popped out",target:"popped out",sentence:"When I opened the mystery box, a toy clown popped out of it.",meaning:"Came out suddenly and quickly.",phonemes:[{p:"p",t:"c",ipa:"/p/"},{p:"o",t:"v",ipa:"/ɒ/ o"},{p:"pp",t:"c",ipa:"/p/"},{p:"ed",t:"d",ipa:"/t/"},{p:"ou",t:"d",ipa:"/aʊ/ ow"},{p:"t",t:"c",ipa:"/t/"}],hint:"Double 'pp' gives a short vowel. 'ou' in out sounds like ow."},
  {word:"smaller animals",target:"smaller animals",sentence:"Some animals in the wild eat other smaller animals.",meaning:"Animals that are not as big as others.",phonemes:[{p:"sm",t:"b",ipa:"/sm/"},{p:"a",t:"v",ipa:"/æ/ a"},{p:"ll",t:"c",ipa:"/l/"},{p:"er",t:"d",ipa:"/ər/"},{p:"a",t:"v",ipa:"/æ/ a"},{p:"n",t:"c",ipa:"/n/"},{p:"i",t:"v",ipa:"/ɪ/ ih"},{p:"m",t:"c",ipa:"/m/"},{p:"al",t:"d",ipa:"/əl/"},{p:"s",t:"c",ipa:"/z/"}],hint:"'sm' is a blend. Double 'll' sounds like one l. Two words together."},
 ]},
 {week:5,words:[
  {word:"cut",target:"cut",sentence:"The butchers cut the meat into smaller pieces.",meaning:"To divide something with a sharp tool, like a knife.",phonemes:[{p:"c",t:"c",ipa:"/k/"},{p:"u",t:"v",ipa:"/ʌ/ uh"},{p:"t",t:"c",ipa:"/t/"}],hint:"Short 'u' sounds like 'uh' — as in cup and sun."},
  {word:"zoomed out",target:"zoomed out",sentence:"The students zoomed out of their classroom when the bell rang.",meaning:"Moved very quickly out of a place.",phonemes:[{p:"z",t:"c",ipa:"/z/"},{p:"oo",t:"d",ipa:"/uː/ oo"},{p:"m",t:"c",ipa:"/m/"},{p:"ed",t:"d",ipa:"/d/"},{p:"ou",t:"d",ipa:"/aʊ/ ow"},{p:"t",t:"c",ipa:"/t/"}],hint:"'oo' makes a long ooo sound. 'ou' in out sounds like ow."},
  {word:"sandwich",target:"sandwich",sentence:"Mary is buying a tuna sandwich for her brother.",meaning:"Two slices of bread with a filling in between.",phonemes:[{p:"s",t:"c",ipa:"/s/"},{p:"a",t:"v",ipa:"/æ/ a"},{p:"nd",t:"b",ipa:"/nd/"},{p:"w",t:"c",ipa:"/w/"},{p:"i",t:"v",ipa:"/ɪ/ ih"},{p:"ch",t:"d",ipa:"/tʃ/ ch"}],hint:"'ch' makes a ch sound like chip. 'nd' blends n and d together."},
  {word:"yelled",target:"yelled",sentence:"Sally yelled in pain during her injection.",meaning:"Shouted very loudly, often because of pain or excitement.",phonemes:[{p:"y",t:"c",ipa:"/j/"},{p:"e",t:"v",ipa:"/ɛ/ eh"},{p:"ll",t:"c",ipa:"/l/"},{p:"ed",t:"d",ipa:"/d/"}],hint:"'y' sounds like j as in yes. Double ll is just one l sound."},
  {word:"some",target:"Some",sentence:"Some pupils have forgotten to do their homework.",meaning:"A number of people or things — not all of them.",phonemes:[{p:"s",t:"c",ipa:"/s/"},{p:"o",t:"v",ipa:"/ʌ/ uh"},{p:"m",t:"c",ipa:"/m/"},{p:"e",t:"s",ipa:"silent"}],hint:"The 'o' sounds like 'uh' and the 'e' at the end is completely silent."},
  {word:"giant",target:"giant",sentence:"My sister screamed when she found a giant cockroach in the kitchen.",meaning:"Extremely large — much bigger than normal.",phonemes:[{p:"g",t:"c",ipa:"/dʒ/ j"},{p:"i",t:"v",ipa:"/aɪ/ eye"},{p:"a",t:"v",ipa:"/æ/ a"},{p:"n",t:"c",ipa:"/n/"},{p:"t",t:"c",ipa:"/t/"}],hint:"'g' before 'i' makes a soft j sound — like giraffe."},

  {word:"tasty",target:"tasty",sentence:"I am looking forward to eating my grandmother's tasty cooked food.",meaning:"Food that has a very nice, delicious flavour.",phonemes:[{p:"t",t:"c",ipa:"/t/"},{p:"a",t:"v",ipa:"/æ/ a"},{p:"st",t:"b",ipa:"/st/"},{p:"y",t:"c",ipa:"/iː/ ee"}],hint:"'st' blends s and t. 'y' at the end sounds like a long ee."},
  {word:"soup",target:"soup",sentence:"The giant bellowed at the villagers, Make me some soup now!",meaning:"A hot liquid food made by cooking ingredients in water.",phonemes:[{p:"s",t:"c",ipa:"/s/"},{p:"ou",t:"d",ipa:"/uː/ oo"},{p:"p",t:"c",ipa:"/p/"}],hint:"'ou' in soup sounds like the long oo in moon."},
 ]},
 {week:7,words:[

  {word:"cover",target:"cover",sentence:"The chefs had to cover all the leftover food with plastic wrappers.",meaning:"To put something over the top of something else.",phonemes:[{p:"c",t:"c",ipa:"/k/"},{p:"o",t:"v",ipa:"/ʌ/ uh"},{p:"v",t:"c",ipa:"/v/"},{p:"er",t:"d",ipa:"/ər/ er"}],hint:"'o' here sounds like uh. 'er' sounds like ur."},
  {word:"cucumbers",target:"cucumbers",sentence:"My mother is buying cucumbers from the supermarket.",meaning:"Long green vegetables with a cool, watery inside.",phonemes:[{p:"c",t:"c",ipa:"/k/"},{p:"u",t:"v",ipa:"/juː/ yoo"},{p:"c",t:"c",ipa:"/k/"},{p:"um",t:"v",ipa:"/ʌm/"},{p:"b",t:"c",ipa:"/b/"},{p:"er",t:"d",ipa:"/ər/ er"},{p:"s",t:"c",ipa:"/z/"}],hint:"Say it in parts: cu · cum · bers."},

  {word:"slices",target:"slices",sentence:"Karen cuts the fish fillet into two slices with a sharp knife.",meaning:"Thin flat pieces cut from something larger.",phonemes:[{p:"sl",t:"b",ipa:"/sl/"},{p:"i",t:"v",ipa:"/aɪ/ eye"},{p:"c",t:"c",ipa:"/s/"},{p:"es",t:"d",ipa:"/ɪz/"}],hint:"'sl' is a blend. 'i' says eye — like in slide."},
  {word:"place",target:"place",sentence:"The teacher told the students to place their books on the table.",meaning:"To put something somewhere carefully.",phonemes:[{p:"pl",t:"b",ipa:"/pl/"},{p:"a",t:"v",ipa:"/eɪ/ ay"},{p:"c",t:"c",ipa:"/s/"},{p:"e",t:"s",ipa:"silent"}],hint:"'pl' is a blend. 'a' says ay — the magic e makes the vowel say its name."},
  {word:"cheese",target:"Cheese",sentence:"Cheese comes from milk and is rich in protein.",meaning:"A food made from milk that can be hard or soft.",phonemes:[{p:"ch",t:"d",ipa:"/tʃ/ ch"},{p:"ee",t:"d",ipa:"/iː/ ee"},{p:"s",t:"c",ipa:"/z/"},{p:"e",t:"s",ipa:"silent"}],hint:"'ch' sounds like in chip. 'ee' is a long ee sound."},
  {word:"pieces",target:"pieces",sentence:"Mrs Lim has collected a few of our art pieces which she will display in the classroom later.",meaning:"Separate parts or items of something.",phonemes:[{p:"p",t:"c",ipa:"/p/"},{p:"ie",t:"d",ipa:"/iː/ ee"},{p:"c",t:"c",ipa:"/s/"},{p:"es",t:"d",ipa:"/ɪz/"}],hint:"'ie' says ee — like in field."},
  {word:"lettuce",target:"lettuce",sentence:"I enjoy eating green leafy vegetables like lettuce.",meaning:"A leafy green vegetable often used in salads.",phonemes:[{p:"l",t:"c",ipa:"/l/"},{p:"e",t:"v",ipa:"/ɛ/ eh"},{p:"tt",t:"c",ipa:"/t/"},{p:"uce",t:"d",ipa:"/ɪs/"}],hint:"Double 'tt' gives a short vowel. The 'uce' ending sounds like iss."},

 ]},
 {week:8,words:[

const TCLS={v:"v",c:"c",b:"b",d:"d",s:"s"};
const TNAME={v:"Vowel",c:"Consonant",b:"Blend",d:"Digraph",s:"Silent"};

// ── STATE ──
function loadState(){try{return JSON.parse(localStorage.getItem("spStarsV4")||"{}");}catch(e){return{};}}
function saveState(){try{localStorage.setItem("spStarsV4",JSON.stringify(ST));}catch(e){}}
let ST=loadState();
if(!ST.scores)ST.scores={};

// current session
let W=null; // active week object
let cur=0,practiceScores=[],mode="learn",inp="",fb="",tries=0;
let testAns=[],testDone=false;

// ── VOICE ──
let voice=null;
function initVoice(){
  const vs=speechSynthesis.getVoices();
  if(!vs.length)return;
  voice=vs.find(v=>v.name==="Samantha")||vs.find(v=>v.name.includes("Samantha"))||vs.find(v=>v.lang==="en-US"&&!/male/i.test(v.name))||vs.find(v=>v.lang.startsWith("en"));
}
speechSynthesis.onvoiceschanged=initVoice;
setTimeout(initVoice,500);

function speak(txt,rate){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  if(voice){u.voice=voice;u.lang=voice.lang;}else u.lang="en-US";
  u.rate=rate||0.78;u.pitch=1.45;
  speechSynthesis.speak(u);
}

function speakTestQ(i){
  const w=W.words[i];
  speechSynthesis.cancel();
  document.querySelectorAll(".test-spk").forEach(b=>b.classList.remove("playing"));
  const btn=document.getElementById("tspk"+i);
  if(btn)btn.classList.add("playing");
  const u1=new SpeechSynthesisUtterance(w.word);
  if(voice){u1.voice=voice;u1.lang=voice.lang;}
  u1.rate=0.65;u1.pitch=1.45;
  u1.onend=()=>{
    setTimeout(()=>{
      const u2=new SpeechSynthesisUtterance(w.word);
      if(voice){u2.voice=voice;u2.lang=voice.lang;}
      u2.rate=0.58;u2.pitch=1.45;
      u2.onend=()=>{if(btn)btn.classList.remove("playing");};
      speechSynthesis.speak(u2);
    },400);
  };
  speechSynthesis.speak(u1);
}

// ── HELPERS ──
function spkSVG(s){s=s||20;return'<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';}

function starRow(n,tot){
  var s="";
  for(var i=0;i<tot;i++)s+=i<n?'<span style="color:#f5c842">★</span>':'<span style="color:#ddd">★</span>';
  return s;
}

function hlSent(sent,tgt){
  return sent.replace(new RegExp(tgt.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i"),function(m){return'<span class="tw">'+m+'</span>';});
}
function blankSent(sent,tgt){
  return sent.replace(new RegExp(tgt.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i"),'<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
}

function setHTML(html){document.getElementById("root").innerHTML=html;}

// ── HOME ──
function showHome(){
  speechSynthesis.cancel();
  W=null;
  var cards=WEEKS.map(function(wk){
    var sc=ST.scores[wk.week];
    var done=sc&&sc.stars===wk.words.length;
    var cls="week-card has-words"+(done?" perfect":" active");
    var starsHtml=sc?'<div style="font-size:10px;">'+starRow(sc.stars,sc.total)+'</div>':'<span style="font-size:10px;color:#ccc">Not started</span>';
    var scoreHtml=sc?sc.stars+"/"+sc.total:"";
    return'<div class="'+cls+'" onclick="startWeek('+wk.week+')"><div class="wk-label">Week '+wk.week+'</div><div class="wk-stars">'+starsHtml+'</div><div class="wk-score">'+scoreHtml+'</div></div>';
  }).join("");
  var next=WEEKS.find(function(w){return!ST.scores[w.week]||ST.scores[w.week].stars<w.words.length;});
  var btnW=next?next.week:WEEKS[0].week;
  var btnL=next?(ST.scores[next.week]?"Try Week "+next.week+" again →":"Start Week "+next.week+" →"):"Practice again!";
  setHTML('<div class="trophy-screen"><h2>My Spelling Stars</h2><p class="tsub">Get all 10 stars in a week to earn your chocolate! 🍫</p><div class="weeks-grid">'+cards+'</div><button class="start-btn" onclick="startWeek('+btnW+')">'+btnL+'</button></div>');
}

// ── START WEEK ──
function startWeek(wkNum){
  W=WEEKS.find(function(w){return w.week===wkNum;});
  if(!W)return;
  cur=0;practiceScores=[];mode="learn";inp="";fb="";tries=0;
  testAns=W.words.map(function(){return"";});testDone=false;
  showPractice();
}

// ── PRACTICE WRAPPER ──
function showPractice(){
  setHTML(
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;">'+
    '<button class="act" style="font-size:12px;padding:6px 12px;" onclick="showHome()">← Home</button>'+
    '<span style="font-size:12px;color:#888;font-weight:600;">Week '+W.week+'</span>'+
    '<span id="hstars" style="font-size:13px;">'+starRow(0,W.words.length)+'</span>'+
    '</div>'+
    '<div class="pips" id="pips"></div>'+
    '<div id="main"></div>'
  );
  drawPips();drawMain();
}

function drawPips(){
  var el=document.getElementById("pips");if(!el)return;
  el.innerHTML=W.words.map(function(_,i){
    var c="pip";
    if(practiceScores[i]!==undefined)c+=" done";
    else if(i===cur)c+=" cur";
    return'<div class="'+c+'"></div>';
  }).join("");
}

function updStars(){
  var el=document.getElementById("hstars");
  if(el)el.innerHTML=starRow(practiceScores.filter(Boolean).length,W.words.length);
}

function drawMain(){
  var el=document.getElementById("main");if(!el)return;
  if(mode==="learn")el.innerHTML=learnHTML();
  else if(mode==="spell")el.innerHTML=spellHTML();
  else if(mode==="test")el.innerHTML=testHTML();
  else if(mode==="score")el.innerHTML=scoreHTML();
  if(mode==="spell"&&!fb){var si=document.getElementById("si");if(si){si.focus();si.setSelectionRange(si.value.length,si.value.length);}}
}

// ── LEARN ──
function learnHTML(){
  var w=W.words[cur];
  var phHTML=w.phonemes.map(function(ph){return'<div class="ph '+TCLS[ph.t]+'">'+ph.p+'<span class="ipa">'+ph.ipa+'</span><span class="ptype">'+TNAME[ph.t]+'</span></div>';}).join("");
  var sent=hlSent(w.sentence,w.target);
  return'<div class="card">'+
    '<div class="wnum">Word '+(cur+1)+' of '+W.words.length+'</div>'+
    '<div class="tabs"><div class="tab on">Learn it</div><div class="tab" onclick="setMode(\'spell\')">Spell it</div><div class="tab" onclick="setMode(\'test\')">Test</div></div>'+
    '<div class="sent-row"><button class="spk" onclick="speak(W.words[cur].sentence,0.78)">'+spkSVG(20)+'</button><div class="sent-text">'+sent+'</div></div>'+
    '<div class="mean"><b>Meaning:</b> '+w.meaning+'</div>'+
    '<div class="plabel">Jolly Phonics breakdown</div>'+
    '<div class="ph-row">'+phHTML+'</div>'+
    '<div class="tip">💡 '+w.hint+'</div>'+
    '<div class="leg"><div class="li"><div class="ld" style="background:#AFA9EC"></div>Vowel</div><div class="li"><div class="ld" style="background:#5DCAA5"></div>Consonant</div><div class="li"><div class="ld" style="background:#F0997B"></div>Blend</div><div class="li"><div class="ld" style="background:#FAC775"></div>Digraph</div><div class="li"><div class="ld" style="background:#ccc"></div>Silent</div></div>'+
    '<div class="btn-row">'+
    '<button class="act pri" onclick="setMode(\'spell\')">Spell it →</button>'+
    (cur<W.words.length-1?'<button class="act" onclick="nextWord()">Next word →</button>':'')+
    (cur>0?'<button class="act" onclick="goBack()">← Back</button>':'')+
    '<button class="act" onclick="setMode(\'test\')" style="margin-left:auto;border-color:#534AB7;color:#534AB7;">Go to test 📝</button>'+
    '</div></div>';
}

// ── SPELL ──
function spellHTML(){
  var w=W.words[cur];
  var wesc=w.word.replace(/'/g,"\\'");
  var sesc=w.sentence.replace(/'/g,"\\'").replace(/"/g,"&quot;");
  var icls="spell-input"+(fb==="good"?" correct":fb==="bad"?" wrong":"");
  return'<div class="card">'+
    '<div class="wnum">Word '+(cur+1)+' of '+W.words.length+'</div>'+
    '<div class="tabs"><div class="tab" onclick="setMode(\'learn\')">Learn it</div><div class="tab on">Spell it</div><div class="tab" onclick="setMode(\'test\')">Test</div></div>'+
    '<div class="sent-row" style="margin-bottom:1.1rem;"><button class="spk" onclick="speak(\''+sesc+'\',0.78)">'+spkSVG(20)+'</button><div class="sent-text">'+blankSent(w.sentence,w.target)+'</div></div>'+
    '<button class="spell-action-btn" onclick="speak(\''+wesc+'\',0.62)"><div class="spk-circle">'+spkSVG(18)+'</div><div><div class="btn-label">Spell it now</div><div class="btn-sub">Tap to hear the word, then type it below</div></div></button>'+
    '<input class="'+icls+'" id="si" type="text" placeholder="Type the word here…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" value="'+inp.replace(/"/g,"&quot;")+'" oninput="handleInp(this.value)" onkeydown="handleKey(event)" '+(fb?"disabled":"")+' dir="ltr"/>'+
    '<div class="btn-row">'+
    (!fb?'<button class="act pri" onclick="chk()">Check ✓</button>':'')+
    (fb==="good"&&cur<W.words.length-1?'<button class="act suc" onclick="next()">Next word →</button>':'')+
    (fb==="good"&&cur===W.words.length-1?'<button class="act suc" onclick="setMode(\'test\')">Take the test! 📝</button>':'')+
    (fb==="bad"?'<button class="act" onclick="retry()">Try again</button>':'')+
    (fb==="bad"&&tries>=2?'<button class="act" onclick="setMode(\'learn\')">Go back to Learn it</button>':'')+
    '<button class="act" onclick="setMode(\'test\')" style="margin-left:auto;border-color:#534AB7;color:#534AB7;">Go to test 📝</button>'+
    '</div>'+
    (fb==="good"?'<div class="fb good pop">⭐ Brilliant! <b>'+w.word+'</b> is correct!</div>':'')+
    (fb==="bad"?'<div class="fb bad">Not quite — tap the speaker to hear the word again, then try!</div>':'')+
    '</div>';
}

// ── TEST ──
function testHTML(){
  var rows=W.words.map(function(w,i){
    var ans=testAns[i]||"";
    var icls="test-input";
    var hint="";
    if(testDone){
      var ok=ans.trim().toLowerCase()===w.word.toLowerCase();
      icls+=ok?" t-ok":" t-bad";
      if(!ok)hint='<span class="test-correct-ans">'+w.word+'</span>';
    }
    return'<div class="test-row">'+
      '<span class="test-num">'+(i+1)+'.</span>'+
      '<button class="test-spk" id="tspk'+i+'" onclick="speakTestQ('+i+')" title="Hear sentence and word">'+spkSVG(20)+'</button>'+
      '<input class="'+icls+'" type="text" placeholder="Type answer…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" value="'+ans.replace(/"/g,"&quot;")+'" oninput="handleTestInp('+i+',this.value)" onkeydown="handleTestKey(event,'+i+')" '+(testDone?"disabled":"")+' dir="ltr" id="tinput'+i+'"/>'+
      hint+
      '</div>';
  }).join("");

  var correct=0;
  if(testDone){correct=testAns.filter(function(a,i){return a.trim().toLowerCase()===W.words[i].word.toLowerCase();}).length;}
  var perfect=testDone&&correct===W.words.length;

  return'<div class="test-card">'+
    '<div class="test-title">Week '+W.week+' Test 📝</div>'+
    '<div class="test-sub">Tap '+spkSVG(14)+' to hear the sentence and word, then type your answer.</div>'+
    rows+
    '<div class="test-actions">'+
    (!testDone
      ?'<button class="act pri" onclick="submitTest()">Submit answers ✓</button><button class="act" onclick="playAll()">▶ Play all</button>'
      :'<button class="act'+(perfect?"":" warn")+'" onclick="retryTest()">'+(perfect?"Try again ↺":"Try test again →")+'</button><button class="act pri" onclick="finishWeek()">See my stars! ⭐</button>'
    )+
    '<button class="act" onclick="setMode(\'learn\')" style="margin-left:auto;">← Back to practice</button>'+
    '</div>'+
    (testDone?'<div class="fb '+(perfect?"good":"bad")+'" style="margin-top:1rem;">'+(perfect?"⭐ Perfect! You spelled all "+W.words.length+" words correctly!":"You got "+correct+" out of "+W.words.length+" correct. Check the answers shown in red, then try again!")+'</div>':'')+
    '</div>';
}

function handleTestInp(i,v){testAns[i]=v;}
function handleTestKey(e,i){
  if(e.key==="Enter"){
    var nx=document.getElementById("tinput"+(i+1));
    if(nx)nx.focus();else submitTest();
  }
}
function submitTest(){testDone=true;speechSynthesis.cancel();drawMain();}
function retryTest(){testAns=W.words.map(function(){return"";});testDone=false;drawMain();}

var playTimer=null;
function playAll(){
  speechSynthesis.cancel();
  if(playTimer)clearTimeout(playTimer);
  var i=0;
  function next(){
    if(i>=W.words.length)return;
    speakTestQ(i);
    var nx=document.getElementById("tinput"+i);if(nx)nx.focus();
    var dur=W.words[i].word.length*300+2000;
    playTimer=setTimeout(function(){i++;next();},dur);
  }
  next();
}

// ── FINISH / SCORE ──
function finishWeek(){
  var correct=testAns.filter(function(a,i){return a.trim().toLowerCase()===W.words[i].word.toLowerCase();}).length;
  ST.scores[W.week]={stars:correct,total:W.words.length};
  saveState();
  mode="score";drawMain();
}

function scoreHTML(){
  var sc=ST.scores[W.week];
  var stars=sc?sc.stars:0,total=sc?sc.total:W.words.length;
  var perfect=stars===total;
  return'<div class="card sc">'+
    '<div class="sc-stars pop">'+starRow(stars,total)+'</div>'+
    '<div class="sc-num">'+stars+' / '+total+'</div>'+
    '<h2>'+(perfect?"Perfect score! Amazing work!":"Keep going — you can get all 10!")+'</h2>'+
    '<p>'+(perfect?"You got every single word right this week!":"You got "+stars+" out of "+total+" correct. Try the test again to collect all your stars!")+'</p>'+
    (perfect?'<div class="choc-box"><div class="choc-icon">🍫</div>You earned your chocolate this week!<br><span style="font-size:13px;font-weight:400;color:#9a7020;">Go claim your reward — you deserve it!</span></div>':'')+
    '<div class="sc-btns">'+
    '<button class="act'+(perfect?"":" warn")+'" onclick="setMode(\'test\')">'+(perfect?"Do test again ↺":"Try test again →")+'</button>'+
    '<button class="act" onclick="setMode(\'learn\')">Back to practice</button>'+
    '<button class="act pri" onclick="showHome()">Back to all weeks</button>'+
    '</div></div>';
}

// ── ACTIONS ──
function setMode(m){speechSynthesis.cancel();mode=m;inp="";fb="";drawMain();}
function handleInp(v){inp=v;}
function handleKey(e){if(e.key==="Enter")chk();}
function chk(){
  var w=W.words[cur];
  if(inp.trim().toLowerCase()===w.word.toLowerCase()){
    fb="good";practiceScores[cur]=true;updStars();
    setTimeout(function(){speak(w.word,0.72);},250);
  }else{fb="bad";tries++;if(practiceScores[cur]===undefined)practiceScores[cur]=false;}
  drawMain();
}
function retry(){fb="";inp="";drawMain();}
function next(){cur++;mode="learn";inp="";fb="";tries=0;drawPips();drawMain();}
function nextWord(){cur++;mode="learn";inp="";fb="";tries=0;drawPips();drawMain();}
function goBack(){if(cur>0){cur--;mode="learn";inp="";fb="";tries=0;drawPips();drawMain();}}
function showHome_btn(){showHome();}

showHome();
</script>
</body>
</html>
